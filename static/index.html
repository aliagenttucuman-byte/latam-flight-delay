<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Challenge Flight Delay</title>
    <script type="module" crossorigin src="/assets/index-p831W2j3.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CHGtFm__.css">
  </head>
  <body>
    <div id="loading-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f0f0f;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:sans-serif;">
      <div style="width:48px;height:48px;border:4px solid #333;border-top-color:#CC0000;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;"></div>
      <p style="margin:0;font-size:18px;">Loading API...</p>
      <p style="margin:4px 0 0;color:#aaa;font-size:14px;">Model was pre-trained at build time. Almost ready.</p>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
      .loaded #loading-overlay { display: none !important; }
    </style>
    <div id="root"></div>
    <script>
      (function poll() {
        fetch('/health')
          .then(r => r.json())
          .then(data => {
            if (data.model_loaded) {
              document.body.classList.add('loaded');
            } else {
              setTimeout(poll, 1500);
            }
          })
          .catch(() => setTimeout(poll, 1500));
      })();
    </script>
  </body>
</html>
